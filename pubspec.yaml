name: myapp
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Camara + OCR (ML Kit) + SQLite (offline)
  camera: ^0.10.5+9
  google_mlkit_text_recognition: ^0.13.0
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Icono de la app (launcher icon)
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/seguridad_bolivia.db
    - assets/logo_1024.png

# ✅ Configuración para generar iconos (Android)
flutter_launcher_icons:
  android: true
  ios: false
  min_sdk_android: 21

  # ✅ REQUERIDO por flutter_launcher_icons (aunque uses adaptive icon)
  image_path: "assets/logo_1024.png"

  # ✅ Adaptive icon (Android 8+)
  adaptive_icon_foreground: "assets/logo_1024.png"
  adaptive_icon_background: "#FFFFFF"